<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MISS CONGENIALITY PICKER</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body id="congeniality-page">

    <nav class="side-nav">
        <div class="nav-trigger">
            <span>☰</span> 
        </div>
        <div class="nav-content">
            <h3>MENU</h3>
            <ul class="list-unstyled">
                <li><a href="index.html">HOME</a></li>
                <li><a href="season_record.html">SEASON CALCULATOR</a></li>
                <li><a href="placement_record.html">PLACEMENT RECORD</a></li>
                <li><a href="miss_congeniality_picker.html">MISS C SELECT</a></li>
                <li><a href="lalaparuza_simulator.html">LALAPARUZA</a></li>
            </ul>
        </div>
    </nav>

    <div class="main-content">
        <div class="dashboard-wrapper d-flex align-items-center justify-content-center">
            
            <div class="dashboard-container mx-auto p-5 bg-white rounded-5 shadow-sm">
                
                <div class="home-hero mb-4 text-center">
                    <h1 id="congeniality-header">MISS CONGENIALITY PICKER</h1>
                    <p class="subtitle text-uppercase">Enter the cast names to begin the voting process</p>
                </div>

                <div class="picker-layout-container">
                    <textarea id="voterInput" placeholder="ENTER NAMES HERE (ONE PER LINE)..."></textarea>
                    
                    <div class="row g-3 mt-3">
                        <div class="col-md-6">
                            <button id="castVotesBtn" class="recordbtn sky-btn w-100" onclick="castVotes()">CAST THEIR VOTES</button>
                        </div>
                        <div class="col-md-6">
                            <button id= "gray-btn" class="recordbtn gray-btn w-100" onclick="document.getElementById('voterInput').value=''; document.getElementById('results').innerHTML=''">CLEAR INPUTS</button>
                        </div>
                    </div>
                </div>

                <div id="results" class="mt-4" aria-live="polite"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
